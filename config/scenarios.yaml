scenarios:
  # ══════════════════════════════════════════════════════════════
  # 시나리오 1 — 1101년 임충의 도주 (林沖逃亡)
  # 핵심 사건: 고구의 모략으로 임충이 창주로 유배
  # ══════════════════════════════════════════════════════════════
  - id: scenario_1101
    year: 1101
    name_ko: "1101년 — 임충의 도주"
    name_zh: "宣和三年 — 豹子頭逃亡"
    description: |
      고구(高俅)의 태위 자리가 굳건하다. 그의 양아들 고아내(高衙內)가
      금군교두(金軍敎頭) 임충(林沖)의 처를 탐해 모략을 꾸미고,
      임충은 억울하게 죄를 뒤집어쓰고 창주(滄州)로 유배된다.
      양산박(梁山泊)은 왕륜(王倫)이 이끄는 소규모 도적패에 불과하며,
      송강(宋江)은 여전히 운성(鄆城) 현청의 말단 서리다.
      영웅들은 각지에 흩어져 있고 세상은 아직 그들을 부르지 않았다.
    background_hint: "플레이어 추천 ★ 임충(林沖) — 창주에서 탈출해 양산박으로 향하는 도주극"
    max_turns: 30
    dynasty_stability: 90
    playable_heroes:
      - lin_chong
      - song_jiang
      - lu_zhishen
      - wu_song
    # ─── 1101년 역사적 세력 분포 ───────────────────────────────
    # · 관군(宋)  — 수도·목주지·요충지 17곳 직할 통치
    # · 양산박   — 왕륜의 소규모 도적단. 양산 단 1곳
    # · 청풍채   — 화영(花榮)이 지키는 반독립 소요새.
    #              청풍채는 산동성 동평부 인근 산채 → 동평 1곳
    # · 요나라   — 안문관 북쪽에서 압박. 접경 요새 안문관에
    #              요나라 영향력이 미침 (후기 시나리오 복선)
    # · 미점령   — 통치 공백·오지:
    #   위주(渭州) — 노지심 사건 직후 혼란, 변방 공백
    #   등주(登州) — 산동 해안 외진 항구, 해적 출몰
    #   노주(盧州) — 강남 내륙 오지, 관군 미배치
    #   무위(無爲) — 강남 오지, 사실상 무정부 상태
    town_control:
      imperial:
        - bianjing    # 수도, 고구·채경 권좌
        - daming      # 북방 최대 거점, 노준의 근거지
        - taiyuan     # 산서 중심, 강한 외곽 방어
        - zhending    # 하북 요새
        - cangzhou    # 임충 유배지
        - yanmen      # 북방 관문 (요나라와 접경)
        - yanzhou     # 산서 내륙
        - xiangzhou   # 하남 요충
        - yunzhou     # 운성현, 송강의 고향·근무지
        - qingzhou    # 산동 대도시, 화영이 인근 주둔
        - jizhou      # 기주, 양산박과 인접한 관군 전진기지
        - dongchang   # 동창부
        - mengzhou    # 맹주, 무송이 호랑이 잡은 곳
        - huazhou     # 화주, 관승이 주둔
        - yangzhou    # 양주, 강남 최대 상업도시
        - jiangzhou   # 강주, 형부 감옥 (송강 유배 예정지)
        - suzhou      # 소주, 강남 대도시
        - hangzhou    # 항주, 강남 최대 중심지
      liangshan:
        - liangshan   # 왕륜의 소규모 도적단
      liao:
        []            # 요나라 게임 내 직할 거점 없음 (국경 밖 세력)
      jin:
        []            # 금나라 1115년 건국 → 1101년엔 미등장
      erlongshan:
        []            # 노지심 아직 도주 중 → 이룡산 미점령
      qingfeng:
        - dongping    # 화영 청풍채, 동평부 산악 인근 반독립
      # 미점령 (controlled_by_faction: null)
      # weizhou / dengzhou / luzhou / wuwei — 위 어떤 세력에도 포함 안 됨
    hero_starts:
      lin_chong:  cangzhou
      song_jiang: yunzhou
      lu_zhishen: daming
      wu_yong:    liangshan
      lu_junyi:   daming
      wu_song:    dongping
      li_kui:     jiangzhou
      yan_qing:   daming
      chai_jin:   cangzhou
      hua_rong:   qingzhou
      qin_ming:   qingzhou
      gao_qiu:    bianjing
      cai_jing:   bianjing
      gao_yanei:  bianjing
      tong_guan:  bianjing
    hero_armies:          # 시나리오 시작 시 각 영웅 병력
      wu_yong:    500     # 양산박 왕륜 부대
      lin_chong:  0       # 유배 직후, 단신
      song_jiang: 0       # 문관 서리, 병력 없음
      lu_zhishen: 600     # 수도사 신도·부랑자 무리
      wu_song:    0       # 표랑 중, 단신
      li_kui:     200     # 강주 잡역부 패거리
      chai_jin:   500     # 귀족 사병
      hua_rong:   800     # 청풍채 수비대
      qin_ming:   1000    # 황통첩아 기병
      gao_qiu:    5000    # 금군 직속 병력

