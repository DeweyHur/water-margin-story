    name_zh: "宣和七年 — 一百單八將"
    description: |
      천강성(天罡星) 36인, 지살성(地煞星) 72인, 총 108명의 호한이
      양산박에 집결하여 산동 일대를 장악하고 있다.
      고구의 대군과 전면전이 벌어지고, 북방에서는 금나라가 움직인다.
      남방에서는 방랍(方臘)이 항주(杭州)를 중심으로 반란 중이다.
      이제 운명의 결전 — 천하를 제패하라.
