  # ══════════════════════════════════════════════════════════════
  - id: scenario_1102
    year: 1102
    name_ko: "1102년 — 강주의 혈서"
    name_zh: "宣和四年 — 江州反詩"
    description: |
      임충은 이미 양산박에 합류했으나 왕륜의 질투로 갈등이 깊다.
      송강은 살인 사건으로 강주(江州)로 유배되어,
      술집 벽에 반역시(反詩)를 쓰다 발각되어 처형 직전에 놓인다.
      노지심은 서경 대상국사를 떠나 이룡산(二龍山)을 향하고 있다.
      이규(李逵)와 장순(張順)이 강주에서 활약한다.
    max_turns: 30
    dynasty_stability: 82
