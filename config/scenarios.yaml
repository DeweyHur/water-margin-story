      송강이 양산박의 새 수령으로 추대되어 각지에서 호걸을 불러 모은다.
      노준의(盧俊義)도 음모에 빠져 양산박에 합류하게 될 운명이다.
      고구는 대군을 편성해 첫 대규모 토벌전을 준비 중이다.
      양산박은 주변 기주(濟州)까지 세력을 확장하기 시작한다.
