  # ══════════════════════════════════════════════════════════════
  # 시나리오 1 — 1101년 임충의 도주 (林沖逃亡)
  # 핵심 사건: 고구의 모략으로 임충이 창주로 유배
  # ══════════════════════════════════════════════════════════════
  - id: scenario_1101
    year: 1101
    name_ko: "1101년 — 임충의 도주"
    name_zh: "宣和三年 — 豹子頭逃亡"
    description: |
      고구(高俅)의 태위 자리가 굳건하다. 그의 양아들 고아내(高衙內)가
      금군교두(金軍敎頭) 임충(林沖)의 처를 탐해 모략을 꾸미고,
      임충은 억울하게 죄를 뒤집어쓰고 창주(滄州)로 유배된다.
      양산박(梁山泊)은 왕륜(王倫)이 이끄는 소규모 도적패에 불과하며,
      송강(宋江)은 여전히 운성(鄆城) 현청의 말단 서리다.
      영웅들은 각지에 흩어져 있고 세상은 아직 그들을 부르지 않았다.
    background_hint: "플레이어 추천 ★ 임충(林沖) — 창주에서 탈출해 양산박으로 향하는 도주극"
    max_turns: 30
    dynasty_stability: 90
    playable_heroes:
      - lin_chong
      - song_jiang
      - lu_zhishen
      - wu_song
    town_control:
